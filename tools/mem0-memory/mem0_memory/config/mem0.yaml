mem0:
  # 向量存储配置（Vector store configuration）
  vector_store:
    provider: qdrant
    config:
      host: ${QDRANT_HOST:-localhost}
      port: ${QDRANT_PORT:-6333}
      collection_name: family_finance_memory
      embedding_model_dims: 1024

  # LLM 配置 — 使用本地 Ollama（lfm2.5，无需外部 API）
  llm:
    provider: ollama
    config:
      model: lfm2.5:latest
      ollama_base_url: ${OLLAMA_HOST:-http://localhost:11434}
      max_tokens: 20000

  # 嵌入模型配置 — 使用本地 Ollama（embedding 走本地，省钱且快）
  embedder:
    provider: ollama
    config:
      model: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      ollama_base_url: ${OLLAMA_HOST:-http://localhost:11434}
      embedding_dims: 1024

# 家庭理财记忆分类 / Memory categories for family finance
# 权威白名单写死在 client.py 的 ACTIVE_CATEGORIES，校验以代码为准；此处仅供参考/展示。
# 已废弃（不要使用）: market_event(查 DataHub)、portfolio_insight(查 Maybe)、allocation_strategy(并入 investment_style)
categories:
  - investment_decision    # 买卖决策的理由、背景、预期
  - lesson_learned         # 经验教训
  - market_view            # 对市场/板块/趋势的看法
  - investment_style       # 风险偏好、投资风格、行为模式
  - family_goal            # 家庭长期目标与里程碑
  - weekly_review          # 周度回顾
  - monthly_review         # 月度回顾
