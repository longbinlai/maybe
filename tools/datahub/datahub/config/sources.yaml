# DataHub 数据源配置
#
# Fallback 机制说明:
# - 同一 fallback_group 内的源按 fallback_priority 排序（数字越小优先级越高）
# - 高优先级源失败时，自动尝试低优先级源
# - 只要组内有一个源成功获取数据，就停止尝试后续源
# - 适合 VPN 场景：高质量源（需要 VPN）失败时，自动降级到可用源
#
# cache_ttl 说明（秒）：
#   RSS 新闻源: 7200 (2h) — 新闻时效性强
#   经济数据: 14400 (4h) — 发布频率低
#   yfinance 价格: 14400 (4h) — 日内波动，每天跑一次够了
#   yfinance 新闻: 7200 (2h) — 新闻时效性强
#   NewsAPI: 7200 (2h) — 新闻时效性强
#
# retention_days 说明（历史数据保留天数）：
#   RSS 新闻: 180 天 — 新闻时效性强，但需要回溯
#   yfinance 价格: 365 天 — 价格历史有长期分析价值
#   yfinance 新闻: 90 天 — 新闻时效性强
#   NewsAPI: 90 天 — 新闻时效性强

sources:
  # ===== 央行数据源（独立，无需 fallback）=====

  federal_reserve:
    type: rss
    category: central_bank
    priority: high
    enabled: true
    cache_ttl: 7200
    retention_days: 180
    url: https://www.federalreserve.gov/feeds/press_all.xml
    max_items: 20
    validation:
      min_items: 10
      max_age_days: 7
      keywords:
        - federal reserve
        - monetary policy
        - interest rate
        - inflation
        - employment

  ecb:
    type: rss
    category: central_bank
    priority: high
    enabled: true
    cache_ttl: 7200
    retention_days: 180
    url: https://www.ecb.europa.eu/rss/press.html
    max_items: 20
    validation:
      min_items: 10
      max_age_days: 7
      keywords:
        - ecb
        - european central bank
        - monetary policy
        - interest rate
        - euro

  boj:
    type: rss
    category: central_bank
    priority: high
    enabled: true
    cache_ttl: 7200
    retention_days: 180
    url: https://www.boj.or.jp/en/rss/whatsnew.xml
    max_items: 20
    validation:
      min_items: 10
      max_age_days: 7
      keywords:
        - bank of japan
        - boj
        - monetary policy
        - yen
        - interest rate

  # ===== 美国经济数据（fallback group）=====

  bea:
    type: rss
    category: economic_data
    priority: high
    enabled: true
    fallback_group: us_economic
    fallback_priority: 1  # 最高优先级：官方 GDP 数据
    cache_ttl: 14400
    retention_days: 180
    url: https://apps.bea.gov/rss/rss.xml
    max_items: 20
    validation:
      min_items: 5
      max_age_days: 30
      keywords:
        - gdp
        - economic growth
        - trade
        - personal income

  bls:
    type: rss
    category: economic_data
    priority: high
    enabled: true
    fallback_group: us_economic
    fallback_priority: 2  # 备选：就业/CPI 数据
    cache_ttl: 14400
    retention_days: 180
    url: https://www.bls.gov/feed/bls_latest.rss
    max_items: 20
    timeout: 30  # 增加超时时间
    validation:
      min_items: 5
      max_age_days: 30
      keywords:
        - employment
        - unemployment
        - cpi
        - inflation
        - labor

  # ===== 外汇数据源 =====

  forexlive:
    type: rss
    category: forex
    priority: medium
    enabled: true
    fallback_group: global_news
    fallback_priority: 1  # 外汇专业新闻
    cache_ttl: 7200
    retention_days: 180
    url: https://www.forexlive.com/feed
    max_items: 20
    validation:
      min_items: 10
      max_age_days: 3
      keywords:
        - forex
        - currency
        - exchange rate
        - usd
        - eur

  # ===== 大宗商品数据源 =====

  oilprice:
    type: rss
    category: commodity
    priority: medium
    enabled: true
    fallback_group: global_news
    fallback_priority: 2  # 大宗商品新闻
    cache_ttl: 7200
    retention_days: 180
    url: https://oilprice.com/rss/main
    max_items: 20
    validation:
      min_items: 10
      max_age_days: 3
      keywords:
        - oil
        - crude
        - gold
        - commodity
        - energy

  # ===== 中国经济新闻（fallback group）=====

  caixin:
    type: rss
    category: china
    priority: medium
    enabled: true
    fallback_group: china_news
    fallback_priority: 1  # 最高优先级：高质量中文财经（需要 VPN）
    cache_ttl: 7200
    retention_days: 180
    url: https://www.caixin.com/rss/index.jsp
    max_items: 20
    timeout: 30  # 增加超时时间
    validation:
      min_items: 5
      max_age_days: 3
      keywords:
        - china
        - chinese economy
        - pm i
        - gdp
        - cpi

  scmp:
    type: rss
    category: china
    priority: medium
    enabled: true
    fallback_group: china_news
    fallback_priority: 2  # 备选：英文中国新闻（需要 VPN）
    cache_ttl: 7200
    retention_days: 180
    url: https://www.scmp.com/rss/91/feed
    max_items: 20
    timeout: 30
    validation:
      min_items: 10
      max_age_days: 3
      keywords:
        - china
        - chinese economy
        - beijing
        - yuan
        - trade

  # ===== Yahoo Finance 数据源 =====

  yfinance_gold:
    type: yfinance
    category: commodity
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - GC=F  # 黄金期货
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 1
      max_age_days: 1

  yfinance_oil:
    type: yfinance
    category: commodity
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - CL=F  # 原油期货
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 1
      max_age_days: 1

  yfinance_fx:
    type: yfinance
    category: forex
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - USDCNY=X  # USD/CNY
      - USDJPY=X  # USD/JPY
      - USDAUD=X  # USD/AUD
      - AUDCNY=X  # AUD/CNY (澳元/人民币)
      - EURUSD=X  # EUR/USD
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 2
      max_age_days: 1

  yfinance_indices:
    type: yfinance
    category: market
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - "^GSPC"      # S&P 500
      - "^DJI"       # Dow Jones
      - "^IXIC"      # NASDAQ
      - "^RUT"       # Russell 2000
      - "^HSI"       # Hang Seng
      - "000001.SS"  # Shanghai Composite (上证综指)
      - "399001.SZ"  # Shenzhen Component (深证成指)
      - "000300.SS"  # CSI 300 (沪深300)
      - "^N225"      # Nikkei 225 (日经225)
      - "^FTSE"      # FTSE 100
      - "^GDAXI"     # DAX (德国)
      - "^STI"       # STI (新加坡)
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 5
      max_age_days: 1

  # ===== 风险与利率指标 =====

  yfinance_risk:
    type: yfinance
    category: risk
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - "^VIX"       # VIX 恐慌指数
      - "^TNX"       # 美国10年期国债收益率
      - "^IRX"       # 美国13周国债收益率（短期利率基准）
      - "^FVX"       # 美国5年期国债收益率
      - "DX-Y.NYB"   # 美元指数 (DXY)
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 3
      max_age_days: 1

  # ===== 中国经济指标 =====

  yfinance_china:
    type: yfinance
    category: china
    priority: high
    enabled: true
    cache_ttl: 14400
    retention_days: 365
    tickers:
      - "2800.HK"    # 盈富基金（港股大盘ETF，反映香港市场）
      - "510300.SS"  # 沪深300ETF（A股核心指标）
      - "518880.SS"  # 华安黄金ETF（中国市场黄金价格）
      - "511010.SS"  # 国债ETF（中国国债收益率参考）
    data_type: price
    period: 5d
    interval: 1d
    validation:
      min_items: 2
      max_age_days: 1

  yfinance_news:
    type: yfinance
    category: market_news
    priority: medium
    enabled: true
    cache_ttl: 7200
    retention_days: 90
    tickers:
      - "^GSPC"      # S&P 500 — 美国市场
      - "^DJI"       # Dow Jones — 美国市场
      - "^IXIC"      # NASDAQ — 科技股
      - "^HSI"       # Hang Seng — 港股
      - "GC=F"       # 黄金期货 — 大宗商品
      - "CL=F"       # 原油期货 — 大宗商品
      - "EURUSD=X"  # 欧元/美元 — 外汇
      - "000001.SS"  # 上证综指 — A股
    data_type: news
    validation:
      min_items: 3
      max_age_days: 7

  # === 新闻 API ===

  newsapi_finance:
    type: newsapi
    enabled: true
    category: news
    priority: high
    fallback_group: global_news
    fallback_priority: 3  # 通用财经新闻（不需要 VPN）
    cache_ttl: 7200
    retention_days: 90
    api_key: ${NEWSAPI_KEY}
    endpoint: everything
    query: "Federal Reserve OR interest rate OR monetary policy"
    language: en
    page_size: 10
    sort_by: publishedAt
    validation:
      min_items: 3
      max_age_days: 3
      keywords:
        - federal reserve
        - interest rate
        - monetary policy
        - inflation

  newsapi_china_finance:
    type: newsapi
    enabled: true
    category: news
    priority: high
    fallback_group: china_news
    fallback_priority: 3  # 备选：中文财经新闻（不需要 VPN）
    cache_ttl: 7200
    retention_days: 90
    api_key: ${NEWSAPI_KEY}
    endpoint: everything
    query: "中国经济 OR 央行 OR GDP OR PMI"
    language: zh
    page_size: 10
    sort_by: publishedAt
    validation:
      min_items: 3
      max_age_days: 3
      keywords:
        - 经济
        - 央行
        - GDP
        - PMI

  # === 中国官方数据（fallback group）===

  pboc:
    type: rss
    enabled: true
    category: rates
    priority: high
    fallback_group: china_official
    fallback_priority: 1  # 最高优先级：央行政策（需要 VPN）
    cache_ttl: 7200
    retention_days: 180
    url: "http://www.pbc.gov.cn/goutongjiaoliu/113456/113469/index.html"
    max_items: 10
    timeout: 30
    validation:
      min_items: 3
      max_age_days: 7
      keywords:
        - 人民银行
        - 利率
        - 货币政策

  nbs:
    type: rss
    enabled: true
    category: indicators
    priority: medium
    fallback_group: china_official
    fallback_priority: 2  # 备选：统计局数据（需要 VPN）
    cache_ttl: 14400
    retention_days: 180
    url: "https://www.stats.gov.cn/sj/zxfb/index.html"
    max_items: 10
    timeout: 30
    validation:
      min_items: 3
      max_age_days: 14
      keywords:
        - GDP
        - CPI
        - PMI
        - 统计
