# Family Investment Policy
# This file defines the target allocation and safety rules for the family portfolio.
# OpenClaw reads this to determine when to alert and suggest rebalancing.

family:
  currency: USD  # Base currency for reporting (Maybe handles conversion)
  risk_tolerance: conservative

allocation_targets:
  cash:
    # Depository accounts, money market
    min: 0.10
    max: 0.25
    target: 0.15
  equity:
    # Investment accounts (stocks, ETFs, mutual funds)
    min: 0.35
    max: 0.55
    target: 0.45
  fixed_income:
    # Bonds, bond funds, CDs
    min: 0.20
    max: 0.40
    target: 0.30
  real_estate:
    # Property holdings
    min: 0.05
    max: 0.20
    target: 0.10
  alternative:
    # Crypto, private equity, commodities
    min: 0.00
    max: 0.10
    target: 0.05

safety_rules:
  cash_min_months: 12            # Liquid cash should cover N months of expenses
  max_single_position: 0.15       # No single security > 15% of portfolio
  rebalance_threshold: 0.08      # Alert if any asset class drifts > 8% from target

notify_conditions:
  - portfolio_drift              # Asset class drift exceeds threshold
  - large_market_drop            # Major index drops > 3% in a day
  - interest_rate_jump           # Central bank rate change > 0.25%
  - usd_cny_large_move           # USD/CNY moves > 2% in a week
  - cash_below_safety            # Cash coverage < cash_min_months

silence_rules:
  daily_move_under: 0.01         # Don't alert on daily moves < 1%
  news_relevance: high_only    # Only push high-relevance news
