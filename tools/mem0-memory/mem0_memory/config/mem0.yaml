mem0:
  # 向量存储配置（Vector store configuration）
  vector_store:
    provider: qdrant
    config:
      host: ${QDRANT_HOST:-localhost}
      port: ${QDRANT_PORT:-6333}
      collection_name: family_finance_memory
      embedding_model_dims: 1024

  # LLM 配置 — 使用百炼（OpenAI 兼容接口）
  llm:
    provider: openai
    config:
      model: ${OPENAI_MODELS:-gpt-4o-mini}
      api_key: ${OPENAI_API_KEY}
      openai_base_url: ${OPENAI_API_BASE:-}

  # 嵌入模型配置 — 使用本地 Ollama（embedding 走本地，省钱且快）
  embedder:
    provider: ollama
    config:
      model: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      ollama_base_url: ${OLLAMA_HOST:-http://localhost:11434}
      embedding_dims: 1024

# 家庭理财记忆分类 / Memory categories for family finance
categories:
  - investment_decision    # 买卖决策记录
  - market_event           # 市场事件及影响
  - portfolio_insight      # 投资组合洞察
  - allocation_strategy    # 资产配置策略
  - lesson_learned         # 经验教训
  - weekly_review          # 周度回顾
  - monthly_review         # 月度回顾
